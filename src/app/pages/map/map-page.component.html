<div class="map-page">

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-brand">🗽 NYC Trip Analytics</div>
        <div class="nav-actions">
            <button class="btn-pair" [class.active]="pairMode" (click)="togglePairMode()">
                {{ pairMode ? 'Cancel Pair' : 'Compare Zones' }}
            </button>
            <button class="btn-nav" (click)="router.navigate(['/statistics'])">Statistics</button>
            <button class="btn-logout" (click)="logout()">Logout</button>
        </div>
    </nav>

    <!-- MAIN -->
    <div class="main">

        <!-- LOADING -->
        <div class="loading-overlay" *ngIf="loading">
            <div class="spinner-large"></div>
            <p>Loading NYC data...</p>
        </div>

        <!-- MAP -->
        <div class="map-container" [class.panel-open]="selectedZone">
            <app-nyc-map [zones]="zones" [selectedHour]="selectedHour" [pairMode]="pairMode" [firstPin]="firstPin"
                (zoneClick)="onZoneClick($event)" />
        </div>

        <!-- SIDE PANEL -->
        <div class="side-panel" [class.open]="selectedZone">
            <app-zone-popup *ngIf="selectedZone" [zone]="selectedZone" [selectedHour]="selectedHour"
                (close)="onClosePanel()" />
        </div>

        <!-- PAIR RESULT -->
        <div class="pair-popup" *ngIf="pairMode && secondPin">
            <div class="pair-content">
                <ng-container *ngIf="pairLoading">
                    <span class="spinner"></span>
                </ng-container>
                <ng-container *ngIf="!pairLoading && pairResult">
                    <h4>{{ firstPin }} → {{ secondPin }}</h4>
                    <p>Avg Duration: <strong>{{ pairResult.avgDuration | number:'1.0-0' }} min</strong></p>
                    <p>Trip Count: <strong>{{ pairResult.tripCount | number }}</strong></p>
                </ng-container>
                <ng-container *ngIf="!pairLoading && !pairResult">
                    <p class="no-data">No statistics available for this pair.</p>
                </ng-container>
                <button (click)="togglePairMode()">Close</button>
            </div>
        </div>

    </div>

    <!-- HOUR SLIDER -->
    <div class="slider-bar">
        <app-hour-slider [selectedHour]="selectedHour" (hourChange)="onHourChange($event)" />
    </div>

</div>
